---
services:
    postgres:
        image: postgres:15-alpine
        container_name: jpcorrect-postgres
        environment:
            POSTGRES_USER: jpcorrect
            POSTGRES_PASSWORD: jpcorrect_password
            POSTGRES_DB: jpcorrect
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U jpcorrect"]
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: jpcorrect-backend
        depends_on:
            - postgres
        env_file:
            - .env
        ports:
            - "8080:8080"

volumes:
    postgres_data:
